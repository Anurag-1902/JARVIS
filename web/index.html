<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sentry webui</title>
<style>
  /* text-generation-webui inspired: gradio dark slate + orange primary */
  :root{
    --bg:#0b0f19; --panel:#1f2937; --panel2:#111827; --border:#374151;
    --ink:#e5e7eb; --dim:#9ca3af; --accent:#f97316; --accent-h:#ea580c;
    --user:#2b3648; --bot:#1a2230; --ok:#34d399; --warn:#fbbf24; --err:#f87171;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;
       font:15px/1.6 "Source Sans Pro",ui-sans-serif,system-ui,-apple-system,sans-serif}
  button,input,select{font:inherit}

  /* top tab bar */
  #tabs{display:flex;align-items:center;gap:2px;padding:0 14px;background:var(--panel2);
        border-bottom:1px solid var(--border);height:46px}
  .tab{padding:12px 18px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;
       font-weight:600;font-size:14px}
  .tab.active{color:var(--ink);border-bottom-color:var(--accent)}
  #brainlbl{margin-left:auto;color:var(--dim);font-size:12.5px}
  #pill{margin-left:12px;font-size:11px;color:var(--dim);border:1px solid var(--border);
        padding:2px 10px;border-radius:12px;text-transform:lowercase}
  #pill.thinking{color:var(--accent);border-color:var(--accent)}
  #pill.listening{color:var(--ok);border-color:var(--ok)}

  #layout{display:grid;grid-template-columns:260px 1fr 300px;height:calc(100vh - 46px)}

  /* left rail — past chats style */
  #left{background:var(--panel2);border-right:1px solid var(--border);padding:14px;
        overflow-y:auto;display:flex;flex-direction:column;gap:16px}
  .blk h4{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);
          margin-bottom:8px;font-weight:700}
  select,#histQ{width:100%;background:var(--panel);color:var(--ink);
        border:1px solid var(--border);padding:8px 10px;border-radius:6px;outline:none}
  select:focus,#histQ:focus{border-color:var(--accent)}
  .hist-item{background:var(--panel);border:1px solid var(--border);border-radius:6px;
        padding:8px 10px;font-size:12.5px;color:var(--dim);margin-top:8px}
  .hist-item .meta{color:var(--accent);font-size:11px;margin-bottom:2px}
  .hist-item .u{color:var(--ink)}

  /* center chat */
  #center{display:flex;flex-direction:column;min-width:0;background:var(--bg)}
  #log{flex:1;overflow-y:auto;padding:26px 0;scrollbar-width:thin;
       scrollbar-color:var(--border) transparent}
  .row{max-width:860px;margin:0 auto 16px;padding:0 22px;display:flex}
  .row.you{justify-content:flex-end}
  .bubble{max-width:82%;padding:12px 16px;border-radius:12px;white-space:pre-wrap;
          border:1px solid var(--border);font-size:15px}
  .you .bubble{background:var(--user);border-top-right-radius:4px}
  .bot .bubble{background:var(--bot);border-top-left-radius:4px}
  .sysrow{max-width:860px;margin:0 auto 12px;padding:0 22px;color:var(--dim);font-size:13px}
  .sysrow.err{color:var(--err)}
  .toolchip{display:inline-block;background:var(--panel);border:1px solid var(--border);
        border-radius:6px;padding:2px 10px;font-size:12px;color:var(--dim);
        font-family:ui-monospace,Menlo,monospace}
  .planblock{border-left:3px solid var(--accent);background:var(--bot)}

  /* composer + button row, textgen style */
  #composerWrap{border-top:1px solid var(--border);background:var(--panel2);padding:14px 22px 16px}
  #composerInner{max-width:860px;margin:0 auto}
  #inp{width:100%;background:var(--panel);border:1px solid var(--border);color:var(--ink);
       padding:13px 14px;border-radius:8px;outline:none;resize:none;min-height:52px}
  #inp:focus{border-color:var(--accent)}
  #btnrow{display:flex;gap:8px;margin-top:10px;align-items:center}
  .btn{padding:9px 22px;border-radius:8px;border:1px solid var(--border);cursor:pointer;
       background:var(--panel);color:var(--ink);font-weight:600;font-size:14px}
  .btn:hover{border-color:var(--dim)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-h)}
  .btn.icon{padding:9px 13px}
  .btn.iconon{border-color:var(--accent);color:var(--accent)}
  #mic.on{border-color:var(--ok);color:var(--ok);animation:pulse 1.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.4)}100%{box-shadow:0 0 0 14px rgba(52,211,153,0)}}

  /* right rail — parameters style */
  #right{background:var(--panel2);border-left:1px solid var(--border);padding:14px;
         overflow-y:auto;display:flex;flex-direction:column;gap:16px}
  #goal{color:var(--ink);font-weight:600;margin-bottom:6px}
  progress{width:100%;height:6px;appearance:none;border-radius:3px;overflow:hidden}
  progress::-webkit-progress-bar{background:var(--panel)}
  progress::-webkit-progress-value{background:var(--accent)}
  .step{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;
        color:var(--dim);font-size:13px;margin-top:4px;background:transparent}
  .step.cur{background:var(--panel);color:var(--ink);border:1px solid var(--border)}
  .step.done{opacity:.5}
  .step .m{width:15px}
  .step.cur .m{color:var(--accent)}
  .step.done .m{color:var(--ok)}
  .smallbtn{font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;cursor:pointer;
        border:1px solid var(--accent);background:transparent;color:var(--accent)}
  .smallbtn:hover{background:rgba(249,115,22,.12)}
  .rowbtns{display:flex;gap:8px;margin-top:10px}
  .rowbtns .btn{flex:1;font-size:12px;padding:8px 6px}
  #proj,#mem{color:var(--dim);font-size:13px;white-space:pre-wrap}

  /* confirm modal */
  #shade{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;
         align-items:center;justify-content:center;z-index:20}
  #shade.show{display:flex}
  #modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;
         max-width:600px;width:92%;padding:22px}
  #modal h4{color:var(--warn);margin-bottom:12px;font-size:14px}
  #modal pre{white-space:pre-wrap;background:var(--panel2);border:1px solid var(--border);
        padding:12px;border-radius:8px;margin-bottom:16px;max-height:220px;overflow:auto;
        font-family:ui-monospace,Menlo,monospace;font-size:13px}
  #modal .mrow{display:flex;gap:10px;justify-content:flex-end}

  .tabpane{display:none}
  .tabpane.active{display:contents}
  @media (max-width:900px){#layout{grid-template-columns:1fr}#left,#right{display:none}}
</style>
</head>
<body>
<div id="tabs">
  <div class="tab active" data-tab="chat">Chat</div>
  <div class="tab" data-tab="session">Session</div>
  <span id="pill">standby</span>
  <span id="brainlbl">—</span>
</div>

<div id="layout">
  <div id="left">
    <div class="blk">
      <h4>Workspace</h4>
      <select id="wsSel"></select>
    </div>
    <div class="blk">
      <h4>Past chats</h4>
      <input id="histQ" placeholder="Search history… (Enter)">
      <div id="histRes"></div>
    </div>
  </div>

  <div id="center">
    <div id="log">
      <div class="sysrow">Sentry web console. Type a command — <b>task: &lt;goal&gt;</b>, <b>do it</b>, <b>next</b>, <b>undo</b>, <b>templates</b> — or ask anything.</div>
    </div>
    <div id="composerWrap"><div id="composerInner">
      <textarea id="inp" rows="1" placeholder="Send a message…"></textarea>
      <div id="btnrow">
        <button class="btn primary" id="send">Generate</button>
        <button class="btn" id="stop">Stop</button>
        <button class="btn" id="cont">Continue</button>
        <span style="flex:1"></span>
        <button class="btn icon" id="mic" title="voice input (Chrome/Edge)">🎙</button>
        <button class="btn icon iconon" id="speakToggle" title="speak replies">🔊</button>
      </div>
    </div></div>
  </div>

  <div id="right">
    <div class="blk">
      <h4>Active task</h4>
      <div id="goal">none</div>
      <progress id="prog" value="0" max="1"></progress>
      <div id="steps"></div>
      <div class="rowbtns">
        <button class="btn" id="undoBtn">⟲ Undo</button>
        <button class="btn" id="tplBtn">💾 Template</button>
      </div>
    </div>
    <div class="blk"><h4>Project</h4><div id="proj">—</div></div>
    <div class="blk"><h4>Memory</h4><div id="mem">—</div></div>
    <div class="blk"><h4>Templates</h4><div id="tplList" style="color:var(--dim);font-size:13px;white-space:pre-wrap">—</div></div>
  </div>
</div>

<div id="shade"><div id="modal">
  <h4>⚠ Permission required</h4>
  <pre id="confirmMsg"></pre>
  <div class="mrow">
    <button class="btn" id="deny">Deny</button>
    <button class="btn primary" id="approve">Approve &amp; run</button>
  </div>
</div></div>

<script>
const log = document.getElementById('log');
const inp = document.getElementById('inp');
const pill = document.getElementById('pill');
let speakOn = true, busy = false, aborter = null;

function setPill(s){ pill.textContent = s; pill.className = s === 'standby' ? '' : s; }
function esc(t){ return (t||'').replace(/</g,'&lt;'); }
function scrollDown(){ log.scrollTop = log.scrollHeight; }

function bubble(kind, text){
  const row = document.createElement('div');
  row.className = 'row ' + kind;
  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text || '';
  row.appendChild(b);
  log.appendChild(row);
  scrollDown();
  return b;
}
function sysline(text, err, chip){
  const d = document.createElement('div');
  d.className = 'sysrow' + (err ? ' err' : '');
  if(chip){ d.innerHTML = '<span class="toolchip">' + esc(text) + '</span>'; }
  else d.textContent = text;
  log.appendChild(d); scrollDown();
}

/* ---------- state ---------- */
async function refreshState(){
  try{
    const s = await (await fetch('/api/state')).json();
    document.getElementById('brainlbl').textContent = s.brain;
    document.getElementById('proj').textContent = s.project;
    document.getElementById('mem').textContent = s.memory;
    renderPlan(s.plan);
    renderWorkspaces(s.workspaces);
    const t = await (await fetch('/api/templates')).json();
    document.getElementById('tplList').textContent = t.text;
  }catch(_){}
}
function renderPlan(p){
  const goal = document.getElementById('goal'), steps = document.getElementById('steps'),
        prog = document.getElementById('prog');
  steps.innerHTML = '';
  if(!p || !p.active){ goal.textContent = 'none'; prog.value = 0; return; }
  goal.textContent = p.goal;
  prog.max = p.steps.length;
  prog.value = p.steps.filter(s=>s.done).length;
  p.steps.forEach((s,i)=>{
    const d = document.createElement('div');
    d.className = 'step' + (s.done ? ' done' : i === p.current ? ' cur' : '');
    d.innerHTML = `<span class="m">${s.done ? '✔' : i === p.current ? '▶' : '·'}</span>
                   <span style="flex:1">${i+1}. ${esc(s.title)}</span>`;
    d.title = s.detail;
    if(i === p.current && !s.done){
      const b = document.createElement('button');
      b.className = 'smallbtn'; b.textContent = 'Execute';
      b.onclick = e=>{ e.stopPropagation(); send('do it'); };
      d.appendChild(b);
    }
    steps.appendChild(d);
  });
}

/* ---------- workspaces ---------- */
const wsSel = document.getElementById('wsSel');
function renderWorkspaces(ws){
  if(!ws) return;
  wsSel.innerHTML = '';
  for(const name of Object.keys(ws.projects)){
    const o = document.createElement('option');
    o.value = name; o.textContent = name;
    o.title = ws.projects[name];
    if(name === ws.current) o.selected = true;
    wsSel.appendChild(o);
  }
  const add = document.createElement('option');
  add.value='__new__'; add.textContent='+ new workspace…';
  wsSel.appendChild(add);
}
wsSel.onchange = async ()=>{
  let name = wsSel.value, workdir = null;
  if(name === '__new__'){
    name = prompt('Workspace name:'); if(!name){refreshState();return;}
    workdir = prompt('Project folder path:'); if(!workdir){refreshState();return;}
  }
  const r = await (await fetch('/api/workspace',{method:'POST',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({name,workdir})})).json();
  sysline(r.message || r.error);
  refreshState();
};

/* ---------- undo / template ---------- */
document.getElementById('undoBtn').onclick = async ()=>{
  const r = await (await fetch('/api/undo',{method:'POST'})).json();
  sysline(r.message); renderPlan(r.plan);
};
document.getElementById('tplBtn').onclick = ()=>{
  const n = prompt('Template name (e.g. levee-deploy):');
  if(n) send('save plan as ' + n.trim());
};

/* ---------- history ---------- */
document.getElementById('histQ').addEventListener('keydown', async e=>{
  if(e.key !== 'Enter') return;
  const q = e.target.value.trim(), box = document.getElementById('histRes');
  box.innerHTML = ''; if(!q) return;
  const r = await (await fetch('/api/history?q='+encodeURIComponent(q))).json();
  if(!r.results.length){ box.innerHTML = '<div class="hist-item">no matches</div>'; return; }
  for(const row of r.results.slice(0,10)){
    const d = document.createElement('div');
    d.className = 'hist-item';
    d.innerHTML = `<div class="meta">${row.ts} · ${esc(row.project)}</div>
      <div class="u">${esc(row.you.slice(0,70))}</div><div>${esc(row.sentry.slice(0,110))}</div>`;
    box.appendChild(d);
  }
});

/* ---------- speech ---------- */
const speakBtn = document.getElementById('speakToggle');
speakBtn.onclick = ()=>{ speakOn=!speakOn; speakBtn.classList.toggle('iconon',speakOn);
  if(!speakOn) speechSynthesis.cancel(); };
function speak(text){
  if(!speakOn || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.slice(0,600));
  const vs = speechSynthesis.getVoices();
  u.voice = vs.find(v=>/en[-_]GB/i.test(v.lang) && /daniel|male/i.test(v.name))
         || vs.find(v=>/en[-_]GB/i.test(v.lang)) || vs.find(v=>v.lang.startsWith('en'));
  u.pitch = 0.9; u.rate = 1.02;
  speechSynthesis.speak(u);
}

/* ---------- confirm modal ---------- */
const shade = document.getElementById('shade');
document.getElementById('approve').onclick = ()=>answer(true);
document.getElementById('deny').onclick = ()=>answer(false);
function askConfirm(msg){ document.getElementById('confirmMsg').textContent = msg;
  shade.classList.add('show'); }
async function answer(ok){ shade.classList.remove('show');
  await fetch('/api/confirm',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({approve:ok})}); }

/* ---------- chat (SSE) ---------- */
async function send(text){
  if(!text || busy) return;
  busy = true; setPill('thinking');
  bubble('you', text);
  inp.value = '';
  let aiB = null, streamed = '';
  aborter = new AbortController();
  try{
    const res = await fetch('/api/chat',{method:'POST',signal:aborter.signal,
      headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    if(!res.ok){ const e = await res.json(); sysline(e.error||res.statusText,true); return; }
    const reader = res.body.getReader(); const dec = new TextDecoder(); let buf='';
    while(true){
      const {value,done} = await reader.read(); if(done) break;
      buf += dec.decode(value,{stream:true});
      let i;
      while((i = buf.indexOf('\n\n')) >= 0){
        const line = buf.slice(0,i).trim(); buf = buf.slice(i+2);
        if(!line.startsWith('data:')) continue;
        const ev = JSON.parse(line.slice(5));
        if(ev.type==='token'){
          if(!aiB) aiB = bubble('bot','');
          streamed += ev.text; aiB.textContent = streamed; scrollDown();
        }else if(ev.type==='tool'){ sysline(ev.text,false,true);
        }else if(ev.type==='confirm'){ askConfirm(ev.message);
        }else if(ev.type==='final'){
          if(!aiB){ aiB = bubble('bot', ev.text);
            if(/^(TASK:|✔|✖|Loaded template)/.test(ev.text)) aiB.classList.add('planblock'); }
          speak(ev.text); renderPlan(ev.plan);
        }else if(ev.type==='error'){ sysline(ev.text,true); }
      }
    }
  }catch(e){
    if(e.name === 'AbortError') sysline('generation stopped');
    else sysline('connection lost: '+e.message, true);
  }finally{
    busy=false; aborter=null; setPill('standby'); refreshState();
  }
}
document.getElementById('send').onclick = ()=>send(inp.value.trim());
document.getElementById('stop').onclick = ()=>{ if(aborter) aborter.abort();
  speechSynthesis.cancel(); };
document.getElementById('cont').onclick = ()=>send('continue');
inp.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(inp.value.trim()); }});

/* ---------- mic ---------- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const micBtn = document.getElementById('mic');
let rec=null, listening=false;
if(SR){
  rec = new SR(); rec.lang='en-IN'; rec.interimResults=true;
  rec.onresult = e=>{ let f='';
    for(const r of e.results) if(r.isFinal) f+=r[0].transcript;
    if(f){ stopMic(); send(f.trim()); } };
  rec.onend = ()=>{ if(listening) stopMic(); };
  rec.onerror = ()=>stopMic();
}else{ micBtn.style.opacity=.35; micBtn.title='needs Chrome/Edge'; }
function startMic(){ if(!rec) return; speechSynthesis.cancel(); listening=true;
  micBtn.classList.add('on'); setPill('listening'); try{rec.start()}catch(_){} }
function stopMic(){ listening=false; micBtn.classList.remove('on');
  if(pill.textContent==='listening') setPill('standby'); try{rec&&rec.stop()}catch(_){} }
micBtn.onclick = ()=>listening?stopMic():startMic();

/* ---------- tabs (Chat active; Session focuses left rail) ---------- */
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    if(t.dataset.tab === 'session'){ document.getElementById('wsSel').focus(); }
    else inp.focus();
  };
});

if('speechSynthesis' in window) speechSynthesis.getVoices();
refreshState(); inp.focus();
</script>
</body>
</html>
